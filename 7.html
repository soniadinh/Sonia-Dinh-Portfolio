<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>7</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">

</head>

<body>
    <!-- Main Contact Page -->
    <div class="container-main" id="contactPage">

        <!-- Top Navigation -->
        
        <!-- Header Section -->
        <div class="header-section">
            <div class="avatar">
                <i> <img src="assets/avatar/sonia.png" alt="sonia"></i>
            </div>
            <h1 class="header-title">Hi, I am Sonia</h1>
            <p class="header-subtitle">Thanks for visiting my website, hit me an email for more information</p>
        </div>

        <!-- Contact Form -->
        <form class="contact-form" id="contactForm" onsubmit="return false;">
            <div class="form-group">
                <label class="form-label">First name</label>
                <input type="text" class="form-control" id="firstName" placeholder="First name" required>
            </div>

            <div class="form-group">
                <label class="form-label">Last name</label>
                <input type="text" class="form-control" id="lastName" placeholder="Last name" required>
            </div>

            <div class="form-group">
                <label class="form-label">Your e-mail</label>
                <input type="email" class="form-control" id="email" placeholder="e-mail" required>
            </div>

            <div class="form-group">
                <label class="form-label">Comment</label>
                <textarea class="form-control" id="comment" placeholder="Write your message here..."
                    required></textarea>
            </div>

            <div class="btn-container">
                <button type="button" class="btn-custom btn-preview" onclick="showPreview()">Preview</button>
            </div>
        </form>

        <!-- Footer -->
        <div class="footer">
            <a href="https://linkedin.com" target="https://www.linkedin.com/in/xuan-dinh/" class="linkedin-icon" title="LinkedIn">
                <i class="bi bi-linkedin"></i>
            </a>
        </div>
    </div>

    <!-- Preview Overlay -->
    <div class="preview-overlay" id="previewOverlay">

            <!-- Preview Section -->
            <div class="preview-section">
                <label class="preview-label">Preview message</label>
                <div class="preview-box" id="previewBox">
                    <p class="preview-name" id="previewName"></p>
                    <p class="preview-email" id="previewEmail"></p>
                    <p class="preview-comment" id="previewComment"></p>
                </div>

                <div class="btn-container">
                    <button type="button" class="btn-custom btn-edit" onclick="hidePreview()">Edit</button>
                    <button type="button" class="btn-custom btn-send" onclick="sendMessage()">Send</button>
                </div>
            </div>

        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="script.js"></script>
</body>

</html>
