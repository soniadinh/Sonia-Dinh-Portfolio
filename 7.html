<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>contact</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">

</head>

<body>
    <!-- Main Contact Page -->
    <div class="container-main" id="contactPage">
        <nav class="navbar-custom">
            <button class="nav-icon" id="menuBtn">
                <img src="assets/icon/hamburger.png" alt="hamburger icon" id="menuIcon">
                <img src="assets/icon/cross.png" alt="cross icon" id="closeIcon" style="display: none;">
            </button>
        </nav>

        <div class="dropdown-menu-custom" id="dropdownMenu">
            <ul>
                <li><a href="demo.html">Home</a></li>
                <li><a href="1.html">Inspiration</a></li>
                <li><a href="0.html">Project</a></li>
                <li><a href="7.html">Contact</a></li>
            </ul>
        </div>

        <!-- Page Title with Shape -->
        <div class="title-section">
            <a href="demo.html">
                <i> <img src="assets/avatar/sonia.png" alt="sonia"></i>
            </a>
            <div class="title-shape shape-contact"></div>
            <h1 class="page-title page-title-contact">contact</h1>
        </div>

        <!-- Top Navigation -->

        <!-- Header Section -->
        <div class="header-section">
            <h1 class="header-title">Thanks for exploring my site</h1>

            <!-- Social Links -->
            <div>
                <a href="https://www.linkedin.com/in/xuan-dinh/" target="blank" class="sm-icon" title="LinkedIn">
                    <i class="bi bi-linkedin"></i>
                </a>

                <a href="https://medium.com/@xdinh2015" target="blank" class="sm-icon" title="Medium">
                    <i class="bi bi-medium"></i>
                </a>
            </div>
            <p class="header-subtitle">If something spark your interest, or would you like to discuss a potential
                collaboration, check out my Linkedin and Medium above, or shoot me an email.</p>
        </div>

        <!-- Contact Form -->
        <form class="contact-form" id="contactForm" onsubmit="return false;">
            <div class="form-group">
                <label class="form-label">First name</label>
                <input type="text" class="form-control" id="firstName" placeholder="First name" required>
            </div>

            <div class="form-group">
                <label class="form-label">Last name</label>
                <input type="text" class="form-control" id="lastName" placeholder="Last name" required>
            </div>

            <div class="form-group">
                <label class="form-label">Your e-mail</label>
                <input type="email" class="form-control" id="email" placeholder="e-mail" required>
            </div>

            <div class="form-group">
                <label class="form-label">Comment</label>
                <textarea class="form-control" id="comment" placeholder="Write your message here..."
                    required></textarea>
            </div>

            <div class="btn-container">
                <button type="button" class="btn-custom btn-preview" onclick="showPreview()">Preview</button>
            </div>
        </form>


    </div>

    <!-- Preview Overlay -->
    <div class="preview-overlay" id="previewOverlay">

        <!-- Preview Section -->
        <div class="preview-section">
            <label class="preview-label">Preview message</label>
            <div class="preview-box" id="previewBox">
                <p class="preview-name" id="previewName"></p>
                <p class="preview-email" id="previewEmail"></p>
                <p class="preview-comment" id="previewComment"></p>
            </div>

            <div class="btn-container">
                <button type="button" class="btn-custom btn-edit" onclick="hidePreview()">Edit</button>
                <button type="button" class="btn-custom btn-send" onclick="sendMessage()">Send</button>
            </div>
        </div>

    </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="script.js"></script>
</body>

</html>
