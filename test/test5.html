<!-- The Shapes -->
<div class="shape circle" onclick="openGif('gif1.gif')"></div>
<div class="shape square" onclick="openGif('gif2.gif')"></div>

<!-- The Overlay -->
<div id="overlay" onclick="closeOverlay()">
    <img id="overlay-gif" src="" alt="Animated GIF">
</div>
<style>
    /* Shape Styles */
    .shape {
        width: 100px;
        height: 100px;
        cursor: pointer;
        display: inline-block;
        margin: 20px;
    }

    .circle {
        background: blue;
        border-radius: 50%;
    }

    .square {
        background: red;
    }

    /* Overlay Styles */
    #overlay {
        display: none;
        /* Hidden by default */
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background-color: rgba(0, 0, 0, 0.8);
        z-index: 1000;
        text-align: center;
    }

    #overlay img {
        margin-top: 10vh;
        /* Adjust position */
        max-width: 80%;
        max-height: 80%;
    }
</style>
<script>
    function openGif(gifUrl) {
        const overlay = document.getElementById('overlay');
        const img = document.getElementById('overlay-gif');
        img.src = gifUrl; // Set the clicked GIF
        overlay.style.display = 'block'; // Show overlay
    }

    function closeOverlay() {
        document.getElementById('overlay').style.display = 'none'; // Hide
    }

</script>
