<!-- HTML -->
<div class="container">
  <!-- The clickable shape -->
  <div id="shape" onclick="showGif()">Click Me</div>

  <!-- The hidden overlay -->
  <div id="overlay" onclick="hideGif()">
    <img src="assets/portfolio/slide-1.gif" alt="Animated GIF">
  </div>
</div>


<style>
  /* CSS */
#shape {
  width: 100px; height: 100px;
  background-color: blue;
  cursor: pointer;
}

#overlay {
  display: none; /* Hidden by default */
  position: fixed;
  top: 0; left: 0; width: 100%; height: 100%;
  background-color: rgba(0,0,0,0.7); /* Translucent background */
  z-index: 999;
}

#overlay img {
  position: absolute;
  top: 50%; left: 50%;
  transform: translate(-50%, -50%);
}
</style>

<script>
function showGif() {
  document.getElementById('overlay').style.display = 'block';
}

function hideGif() {
  document.getElementById('overlay').style.display = 'none';
}

</script>
